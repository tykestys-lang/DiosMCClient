name: Build DiosMC Client

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.4'

      - name: Build with Gradle
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: DiosMCClient
          path: build/libs/*.jar
